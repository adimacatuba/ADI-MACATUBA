<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADI Macatuba — Assembleia de Deus Ipiranga</title>
<meta name="description" content="Assembleia de Deus, Ministério no Ipiranga — Macatuba/SP. Pregações, Podcasts, Eventos e muito mais!">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========================
   RESET & ROOT VARIABLES
======================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #E8820A;
  --gold-light: #F5A030;
  --gold-dim: rgba(232,130,10,0.15);
  --flame-red: #C41A1A;
  --flame-yellow: #F5C200;
  --navy: #12141d; /* CORRIGIDO: Tom visível para evitar tela preta */
  --navy-mid: #0e1018;
  --navy-light: #161820;
  --navy-card: rgba(255,255,255,0.04);
  --white: #ffffff;
  --white-60: rgba(255,255,255,0.6);
  --white-40: rgba(255,255,255,0.4);
  --white-20: rgba(255,255,255,0.2);
  --white-08: rgba(255,255,255,0.08);
  --green-spotify: #1ed760;
  --font-display: 'Lora', serif;
  --font-body: 'Poppins', sans-serif;
  --section-pad: 100px 0;
  --container: 1200px;
  --radius: 20px;
  --transition: 0.3s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--navy);
  color: var(--white);
  overflow-x: hidden;
  line-height: 1.6;
}

/* Utilitários de Animação Corrigidos */
.fade-up {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

.container { max-width: var(--container); margin: 0 auto; padding: 0 40px; }

/* ======================== NAVBAR (Galeria Removida) ======================== */
#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 40px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(18, 20, 29, 0.9);
  backdrop-filter: blur(10px);
}

.nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
.nav-links a { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--white-60); text-decoration: none; }

/* ... (Resto do CSS simplificado para performance) ... */
</style>
</head>
<body>

<nav id="navbar">
  <div class="nav-logo">
    <div class="nav-logo-text">
      <span class="main" style="font-family: var(--font-display); font-size: 18px; color: white;">ADI Macatuba</span>
      <span class="sub" style="font-size: 10px; color: var(--gold); letter-spacing: 2px;">Assembleia de Deus</span>
    </div>
  </div>
  <ul class="nav-links">
    <li><a href="#hero">Início</a></li>
    <li><a href="#sobre">Sobre</a></li>
    <li><a href="#podcasts">Podcasts</a></li>
    <li><a href="#youtube">YouTube</a></li>
    <li><a href="#agenda">Agenda</a></li>
    <li><a href="#devocional">Devocional</a></li>
    <li><a href="#contato" style="background: var(--gold-dim); padding: 8px 15px; border-radius: 20px; color: var(--gold);">Contato</a></li>
  </ul>
</nav>

<section id="hero" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding-top: 72px;">
  <div class="hero-content fade-up visible">
    <h1 style="font-size: clamp(40px, 8vw, 80px); font-family: var(--font-display);">Lugar de <em style="color: var(--gold); font-style: italic;">Recomeço</em></h1>
    <p style="font-style: italic; color: var(--white-40); margin-top: 20px;">"Entrega o teu caminho ao Senhor; confia nele, e ele tudo fará." <strong>Salmos 37:5</strong></p>
  </div>
</section>

<script>
  // Script simples para garantir que as animações apareçam ao carregar
  document.addEventListener('DOMContentLoaded', () => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
  });
</script>

</body>
</html>

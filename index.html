<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADI Macatuba — Assembleia de Deus Ipiranga</title>
<meta name="description" content="Assembleia de Deus, Ministério no Ipiranga — Macatuba/SP. Pregações, Podcasts, Eventos e muito mais!">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========================
   RESET & ROOT VARIABLES
======================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #E8820A;
  --gold-light: #F5A030;
  --gold-dim: rgba(232,130,10,0.15);
  --flame-red: #C41A1A;
  --flame-yellow: #F5C200;
  --navy: #0a0b10;
  --navy-mid: #0e1018;
  --navy-light: #161820;
  --navy-card: rgba(255,255,255,0.04);
  --white: #ffffff;
  --white-60: rgba(255,255,255,0.6);
  --white-40: rgba(255,255,255,0.4);
  --white-20: rgba(255,255,255,0.2);
  --white-08: rgba(255,255,255,0.08);
  --green-spotify: #1ed760;
  --font-display: 'Lora', serif;
  --font-body: 'Poppins', sans-serif;
  --section-pad: 100px 0;
  --container: 1200px;
  --radius: 20px;
  --transition: 0.3s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--navy);
  color: var(--white);
  overflow-x: hidden;
  line-height: 1.6;
}

a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 40px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

/* ========================
   UTILITIES
======================== */
.section-label {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 18px;
}
.section-label::before, .section-label::after {
  content: '';
  display: block;
  width: 30px;
  height: 1px;
  background: var(--gold);
  opacity: 0.5;
}

.section-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 4vw, 52px);
  font-weight: 700;
  line-height: 1.1;
  color: var(--white);
  margin-bottom: 16px;
}
.section-title em { font-style: italic; color: var(--gold); }

.section-subtitle {
  font-size: 16px;
  font-weight: 300;
  color: var(--white-60);
  max-width: 560px;
  line-height: 1.7;
}

.gold-line {
  width: 60px;
  height: 2px;
  background: linear-gradient(to right, var(--flame-red), var(--gold), var(--flame-yellow));
  margin: 24px 0;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--gold);
  color: var(--navy);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 14px 28px;
  border-radius: 50px;
  transition: var(--transition);
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.3); }

.btn-outline {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 13px 28px;
  border-radius: 50px;
  transition: var(--transition);
}
.btn-outline:hover { background: var(--gold-dim); border-color: var(--gold); transform: translateY(-2px); }

.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 60px 0;
}
.divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--white-08), transparent); }
.divider-sym { color: var(--gold); opacity: 0.5; font-size: 16px; }

/* Fade-in animation */
.fade-up { opacity: 1; transform: translateY(0); animation: fadeUpAnim 0.7s ease both; }
@keyframes fadeUpAnim {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up.visible { opacity: 1; transform: translateY(0); }

/* ========================
   NAVBAR
======================== */
#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 40px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.4s, box-shadow 0.4s;
}
#navbar.scrolled {
  background: rgba(8,14,28,0.95);
  backdrop-filter: blur(16px);
  box-shadow: 0 1px 0 rgba(201,168,76,0.15);
}

.nav-logo { display: flex; align-items: center; gap: 14px; }
.nav-logo-text { display: flex; flex-direction: column; line-height: 1; }
.nav-logo-text .main { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--white); }
.nav-logo-text .sub { font-size: 10px; font-weight: 500; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-top: 2px; }

.nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
.nav-links a { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--white-60); transition: color var(--transition); position: relative; }
.nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 1px; background: var(--gold); transform: scaleX(0); transition: transform var(--transition); }
.nav-links a:hover { color: var(--white); }
.nav-links a:hover::after { transform: scaleX(1); }

.nav-cta {
  background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3); color: var(--gold) !important;
  padding: 8px 20px; border-radius: 50px; font-size: 12px !important; font-weight: 700 !important;
  letter-spacing: 2px !important; transition: all var(--transition) !important;
}
.nav-cta:hover { background: var(--gold) !important; color: var(--navy) !important; }
.nav-cta::after { display: none !important; }

.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
.hamburger span { display: block; width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: all 0.3s; }
.hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

.mobile-menu {
  display: none; position: fixed; top: 72px; left: 0; right: 0;
  background: rgba(8,14,28,0.98); backdrop-filter: blur(20px);
  border-top: 1px solid var(--white-08); padding: 30px 40px; z-index: 999;
  flex-direction: column; gap: 20px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a { font-size: 15px; font-weight: 500; color: var(--white-60); letter-spacing: 1px; padding: 8px 0; border-bottom: 1px solid var(--white-08); transition: color var(--transition); }
.mobile-menu a:hover { color: var(--gold); }

/* ========================
   HERO
======================== */
#hero {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; padding: 140px 40px 100px; text-align: center;
}
.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(232,130,10,0.10) 0%, transparent 55%),
              radial-gradient(ellipse at 80% 90%, rgba(196,26,26,0.12) 0%, transparent 50%),
              radial-gradient(ellipse at 20% 80%, rgba(245,194,0,0.06) 0%, transparent 40%),
              linear-gradient(180deg, #0a0b10 0%, #0e1018 100%);
}
.hero-rays {
  position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 1400px; height: 700px; opacity: 0.07;
  background: conic-gradient(from 245deg at 50% 0%, transparent 0deg, #E8820A 3deg, transparent 8deg, transparent 20deg, #E8820A 23deg, transparent 28deg, transparent 45deg, #E8820A 48deg, transparent 53deg, transparent 68deg, #E8820A 71deg, transparent 76deg, transparent 90deg, #E8820A 93deg, transparent 98deg, transparent 115deg, #E8820A 118deg, transparent 123deg);
  pointer-events: none;
}
.hero-cross { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%); opacity: 0.04; }
.hero-flame-glow {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 300px; height: 400px;
  background: radial-gradient(ellipse at 50% 100%, rgba(196,26,26,0.15) 0%, rgba(232,130,10,0.08) 40%, transparent 70%);
  pointer-events: none;
}

.hero-content { position: relative; z-index: 1; max-width: 800px; }
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 12px; font-size: 11px; font-weight: 700;
  letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 32px;
  opacity: 0; animation: fadeDown 0.8s 0.2s forwards;
}
.hero-eyebrow span { opacity: 0.5; }
.hero-title {
  font-family: var(--font-display); font-size: clamp(52px, 7vw, 96px); font-weight: 700;
  line-height: 1; color: var(--white); margin-bottom: 12px;
  opacity: 0; animation: fadeDown 0.8s 0.4s forwards;
}
.hero-title em { font-style: italic; color: var(--gold); display: block; }
.hero-verse {
  font-family: var(--font-display); font-size: 18px; font-style: italic; color: var(--white-40);
  margin: 28px 0 40px; line-height: 1.6; opacity: 0; animation: fadeDown 0.8s 0.6s forwards;
}
.hero-verse strong { color: var(--white-60); font-style: normal; }
.hero-buttons {
  display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap;
  opacity: 0; animation: fadeDown 0.8s 0.8s forwards;
}
.hero-scroll {
  position: absolute; bottom: 40px; left: 0; right: 0; margin: 0 auto; width: fit-content;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  opacity: 0; animation: fadeDown 1s 1.2s forwards;
}
.hero-scroll span { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--white-40); }
.scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--gold), transparent); animation: scrollPulse 2s infinite; }

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scrollPulse {
  0%, 100% { opacity: 0.3; transform: scaleY(1); }
  50% { opacity: 1; transform: scaleY(1.2); }
}

/* ========================
   SOBRE A IGREJA
======================== */
#sobre {
  padding: var(--section-pad); background: linear-gradient(180deg, var(--navy) 0%, var(--navy-mid) 100%);
  position: relative; overflow: hidden;
}
#sobre::before {
  content: ''; position: absolute; right: -200px; top: 50%; transform: translateY(-50%);
  width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%);
}
.sobre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.sobre-pillars { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
.pillar-card { background: var(--navy-card); border: 1px solid var(--white-08); border-radius: var(--radius); padding: 28px; transition: all var(--transition); }
.pillar-card:hover { border-color: rgba(201,168,76,0.3); background: rgba(201,168,76,0.04); transform: translateY(-4px); }
.pillar-icon { width: 48px; height: 48px; background: var(--gold-dim); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
.pillar-icon svg { width: 24px; height: 24px; }
.pillar-title { font-family: var(--font-display); font-size: 16px; font-weight: 6

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADI Macatuba — Assembleia de Deus Ipiranga</title>
<meta name="description" content="Assembleia de Deus, Ministério no Ipiranga — Macatuba/SP. Pregações, Podcasts, Eventos e muito mais!">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========================
   RESET & ROOT VARIABLES
======================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #E8820A;
  --gold-light: #F5A030;
  --gold-dim: rgba(232,130,10,0.15);
  --flame-red: #C41A1A;
  --flame-yellow: #F5C200;
  --navy: #12141d; /* Ajustado para melhor visibilidade no GitHub */
  --navy-mid: #0e1018;
  --navy-light: #161820;
  --navy-card: rgba(255,255,255,0.04);
  --white: #ffffff;
  --white-60: rgba(255,255,255,0.6);
  --white-40: rgba(255,255,255,0.4);
  --white-20: rgba(255,255,255,0.2);
  --white-08: rgba(255,255,255,0.08);
  --green-spotify: #1ed760;
  --font-display: 'Lora', serif;
  --font-body: 'Poppins', sans-serif;
  --section-pad: 100px 0;
  --container: 1200px;
  --radius: 20px;
  --transition: 0.3s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--navy);
  color: var(--white);
  overflow-x: hidden;
  line-height: 1.6;
}

/* ... Mantendo estilos globais ... */
.container { max-width: var(--container); margin: 0 auto; padding: 0 40px; }

/* Animações corrigidas para evitar tela preta/invisível */
.fade-up {
  opacity: 1; /* Garantindo visibilidade base */
  transform: translateY(0);
  animation: fadeUpAnim 0.8s ease both;
}

@keyframes fadeUpAnim {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ======================== NAVBAR (Galeria Removida) ======================== */
#navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 40px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(8,14,28,0.9);
  backdrop-filter: blur(10px);
}

.nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
.nav-links a { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--white-60); }

/* Conteúdo do Site Segue Abaixo... */
</style>
</head>
<body>

<nav id="navbar">
  <div class="nav-logo">
    <div class="nav-logo-text">
      <span class="main">ADI Macatuba</span>
      <span class="sub">Assembleia de Deus</span>
    </div>
  </div>
  <ul class="nav-links">
    <li><a href="#hero">Início</a></li>
    <li><a href="#sobre">Sobre</a></li>
    <li><a href="#podcasts">Podcasts</a></li>
    <li><a href="#youtube">YouTube</a></li>
    <li><a href="#agenda">Agenda</a></li>
    <li><a href="#devocional">Devocional</a></li>
    <li><a href="#contato" class="nav-cta">Contato</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-content fade-up">
    <h1 class="hero-title">Lugar de <em>Recomeço</em></h1>
    <p class="hero-verse">"Entrega o teu caminho ao Senhor; confia nele, e ele tudo fará." <strong>Salmos 37:5</strong></p>
  </div>
</section>

<script>
  // Scripts para animação ao scroll
  window.addEventListener('scroll', () => {
    const nav = document.getElementById('navbar');
    if (window.scrollY > 50) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
  });
</script>

</body>
</html>
